name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Build iPhone 5 IPA
        run: |
          chmod +x ./build-ipa.sh
          ./build-ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-ipa
          path: build/MusicPlayer.ipa
