name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.0.1.app
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Build IPA
        run: |
          chmod +x ./build-ipa.sh
          ./build-ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-ipa
          path: build/MusicPlayer.ipa
